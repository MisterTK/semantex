name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SEMANTEX_NO_TELEMETRY: "1"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all -- --skip test_colbert

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          components: rustfmt
      - run: cargo fmt --all -- --check

  integration:
    name: Integration (${{ matrix.os }})
    needs: [check, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Smoke test
        shell: bash
        run: |
          if [ -f ./target/release/semantex ]; then
            BIN=./target/release/semantex
          else
            BIN=./target/release/semantex.exe
          fi

          # Binary health checks (no ONNX Runtime needed)
          "$BIN" --version
          "$BIN" --help > /dev/null

          # Set ORT_DYLIB_PATH if the dylib was downloaded during build
          ORT_LIB=$(find target/release -maxdepth 1 -name "libonnxruntime*" -o -name "onnxruntime*.dll" 2>/dev/null | head -1)
          [ -n "$ORT_LIB" ] && export ORT_DYLIB_PATH="$ORT_LIB"

          # Full pipeline test — index the repo and check status
          # This requires ONNX Runtime; if not available, log and skip gracefully
          if "$BIN" index . 2>&1; then
            "$BIN" status .
          else
            echo "::warning::ONNX Runtime not found — skipping index/status smoke test"
          fi
