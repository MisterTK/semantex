name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.97.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          name="semantex-${version}-${{ matrix.target }}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="${{ steps.archive.outputs.name }}"
          mkdir -p "${archive}"
          cp "target/${{ matrix.target }}/release/semantex" "${archive}/"
          for lib in target/${{ matrix.target }}/release/libonnxruntime*.{dylib,so}; do
            [ -f "$lib" ] && cp "$lib" "${archive}/"
          done
          cp LICENSE README.md "${archive}/" 2>/dev/null || true
          tar czf "${archive}.tar.gz" "${archive}"
          shasum -a 256 "${archive}.tar.gz" > "${archive}.tar.gz.sha256"

      - name: Fix macOS rpath
        if: runner.os == 'macOS'
        shell: bash
        run: |
          archive="${{ steps.archive.outputs.name }}"
          binary="${archive}/semantex"
          for lib in "${archive}"/libonnxruntime*.dylib; do
            [ -f "$lib" ] && install_name_tool -add_rpath @executable_path "$binary" 2>/dev/null || true
          done

      - name: Fix Linux rpath
        if: runner.os == 'Linux'
        shell: bash
        run: |
          archive="${{ steps.archive.outputs.name }}"
          binary="${archive}/semantex"
          if [ -f "$binary" ]; then
            patchelf --set-rpath '$ORIGIN' "$binary" 2>/dev/null || true
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "${{ steps.archive.outputs.name }}"
          New-Item -ItemType Directory -Force -Path $archive
          Copy-Item "target/${{ matrix.target }}/release/semantex.exe" "$archive/"
          Get-ChildItem "target/${{ matrix.target }}/release/onnxruntime*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "$archive/"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$archive/" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$archive/" }
          Compress-Archive -Path "$archive/*" -DestinationPath "$archive.zip"
          Get-FileHash "$archive.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $archive.zip" } | Out-File -Encoding ascii "$archive.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: |
            ${{ steps.archive.outputs.name }}.tar.gz
            ${{ steps.archive.outputs.name }}.tar.gz.sha256
            ${{ steps.archive.outputs.name }}.zip
            ${{ steps.archive.outputs.name }}.zip.sha256
          if-no-files-found: ignore

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@v2
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
      # Publish in dependency order: core → mcp → cli. Each step is idempotent
      # (skips if this version is already live) so a re-run after a partial
      # failure doesn't abort on "already published" before reaching the rest.
      - name: Publish semantex-core
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          status=$(curl -s -o /dev/null -w '%{http_code}' -H "User-Agent: semantex-release (https://github.com/MisterTK/semantex)" "https://crates.io/api/v1/crates/semantex-core/${version}")
          if [ "$status" = "200" ]; then
            echo "semantex-core ${version} already published, skipping"
          else
            cargo publish -p semantex-core --no-verify
          fi
      - name: Publish semantex-mcp
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          status=$(curl -s -o /dev/null -w '%{http_code}' -H "User-Agent: semantex-release (https://github.com/MisterTK/semantex)" "https://crates.io/api/v1/crates/semantex-mcp/${version}")
          if [ "$status" = "200" ]; then
            echo "semantex-mcp ${version} already published, skipping"
          else
            cargo publish -p semantex-mcp --no-verify
          fi
      - name: Publish semantex-cli
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          status=$(curl -s -o /dev/null -w '%{http_code}' -H "User-Agent: semantex-release (https://github.com/MisterTK/semantex)" "https://crates.io/api/v1/crates/semantex-cli/${version}")
          if [ "$status" = "200" ]; then
            echo "semantex-cli ${version} already published, skipping"
          else
            cargo publish -p semantex-cli --no-verify
          fi

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          echo "## SHA-256 Checksums" > release/checksums.txt
          echo '```' >> release/checksums.txt
          cat release/*.sha256 >> release/checksums.txt
          echo '```' >> release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body_path: release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          # Extract per-platform SHA256s from downloaded artifacts
          get_sha() {
            local file="release/${1}.sha256"
            [ -f "$file" ] && awk '{print $1}' "$file" || echo "CHECKSUM_UNAVAILABLE"
          }

          aarch64_darwin=$(get_sha "semantex-v${version}-aarch64-apple-darwin.tar.gz")
          x86_64_darwin=$(get_sha  "semantex-v${version}-x86_64-apple-darwin.tar.gz")
          aarch64_linux=$(get_sha  "semantex-v${version}-aarch64-unknown-linux-gnu.tar.gz")
          x86_64_linux=$(get_sha   "semantex-v${version}-x86_64-unknown-linux-gnu.tar.gz")

          # Clone the tap repo, update the formula, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/MisterTK/homebrew-semantex.git" tap
          cd tap

          sed -i "s/version \".*\"/version \"${version}\"/" Formula/semantex.rb

          # Replace whatever sha256 value currently follows each platform's
          # `url` line — NOT a one-time placeholder-token substitution. The
          # placeholder-token approach (sed for a literal string like
          # AARCH64_APPLE_DARWIN_SHA256) only matches once: the first release
          # replaces the token with a real hash, and every release after that
          # has nothing left to match, so the sed silently no-ops and the
          # formula's checksums go stale forever while the release assets
          # keep changing underneath it (confirmed broken this way in
          # practice — `brew install` failed checksum verification because
          # the pinned hash didn't match the actual asset). Matching by
          # structural position (whichever sha256 line follows a given
          # platform's url line) is idempotent: it works identically on the
          # very first run and on every run after.
          awk -v aarch64_darwin="$aarch64_darwin" \
              -v x86_64_darwin="$x86_64_darwin" \
              -v aarch64_linux="$aarch64_linux" \
              -v x86_64_linux="$x86_64_linux" '
            /aarch64-apple-darwin\.tar\.gz"/        { plat = "aarch64_darwin" }
            /x86_64-apple-darwin\.tar\.gz"/         { plat = "x86_64_darwin" }
            /aarch64-unknown-linux-gnu\.tar\.gz"/   { plat = "aarch64_linux" }
            /x86_64-unknown-linux-gnu\.tar\.gz"/    { plat = "x86_64_linux" }
            /sha256 "/ && plat != "" {
              if (plat == "aarch64_darwin") { hash = aarch64_darwin }
              else if (plat == "x86_64_darwin") { hash = x86_64_darwin }
              else if (plat == "aarch64_linux") { hash = aarch64_linux }
              else { hash = x86_64_linux }
              sub(/sha256 "[^"]*"/, "sha256 \"" hash "\"")
              plat = ""
            }
            { print }
          ' Formula/semantex.rb > Formula/semantex.rb.new
          mv Formula/semantex.rb.new Formula/semantex.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Formula/semantex.rb
          git diff --staged --quiet || git commit -m "semantex ${version}"
          git push

      - name: Update Scoop manifest
        if: ${{ env.SCOOP_BUCKET_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.SCOOP_BUCKET_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sha=$(awk '{print $1}' "release/semantex-v${version}-x86_64-pc-windows-msvc.zip.sha256" 2>/dev/null || echo "CHECKSUM_UNAVAILABLE")

          git clone "https://x-access-token:${GH_TOKEN}@github.com/MisterTK/scoop-semantex.git" bucket
          cd bucket

          url="https://github.com/MisterTK/semantex/releases/download/v${version}/semantex-v${version}-x86_64-pc-windows-msvc.zip"
          extract_dir="semantex-v${version}-x86_64-pc-windows-msvc"
          jq --arg version "$version" --arg url "$url" --arg hash "$sha" --arg dir "$extract_dir" \
            '.version = $version
             | .architecture."64bit".url = $url
             | .architecture."64bit".hash = $hash
             | .architecture."64bit".extract_dir = $dir' \
            bucket/semantex.json > bucket/semantex.json.tmp
          mv bucket/semantex.json.tmp bucket/semantex.json

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add bucket/semantex.json
          git diff --staged --quiet || git commit -m "semantex ${version}"
          git push

