[package]
name = "semantex-cli"
description = "CLI for semantex semantic code search"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true

[[bin]]
name = "semantex"
path = "src/main.rs"

[dependencies]
semantex-core.workspace = true
semantex-mcp = { workspace = true, optional = true }
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, optional = true }

clap = { version = "4", features = ["derive", "env"] }
colored = "3"
postcard = { workspace = true }
dirs = "6"
mimalloc = "0.1"
ureq = "3"

# Used by `skills-generate` (YAML rendering and parse-validation of generated files).
serde_yml = "0.0.12"
# Used by `install-codex` (Codex CLI's MCP config is TOML, not JSON).
toml = "0.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"

[features]
default = ["mcp", "http"]
mcp = ["dep:semantex-mcp"]
http = ["mcp", "dep:tokio", "semantex-mcp/http"]
# `llm` forwards to both core (the search-side hooks) and mcp (the MCP entry
# point that injects the backend into AgentPipeline). It implies `mcp` so
# the MCP crate is compiled with its own `llm` feature — otherwise the
# AgentPipeline wiring on the MCP side would be unreachable.
llm = ["mcp", "semantex-core/llm", "semantex-mcp/llm", "dep:tokio"]

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/semantex-v{ version }-{ target }.tar.gz"
bin-dir = "semantex-v{ version }-{ target }/{ bin }{ binary-ext }"
pkg-fmt = "tgz"

[lints]
workspace = true
